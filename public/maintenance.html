<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maintenance en cours</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

      body {
        font-family: 'Inter', sans-serif;
      }

      :root {
        --color-primary: oklch(20.5% 0 0);

        --color-bg: oklch(97% 0 0);
        --color-surface: oklch(98.5% 0 0);
        --color-border: oklch(87% 0 0);

        --color-text: oklch(14.5% 0 0);
        --color-title-muted: oklch(64% 0 0);
        --color-text-muted: oklch(55.6% 0 0);
        --color-text-inverse: oklch(98.5% 0 0);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --color-primary: oklch(92.2% 0 0);

          --color-bg: oklch(14.5% 0 0);
          --color-surface: oklch(20.5% 0 0);
          --color-border: oklch(37.1% 0 0);

          --color-text: oklch(97% 0 0);
          --color-title-muted: oklch(87% 0 0);
          --color-text-muted: oklch(70.8% 0 0);
          --color-text-inverse: oklch(14.5% 0 0);
        }
      }
    </style>
    <div
      class="min-h-screen flex items-center justify-center bg-[--color-bg] text-[--color-text]"
    >
      <main class="w-full pb-10">
        <div
          class="max-w-3xl w-full mx-auto px-6 flex flex-col text-center items-center"
        >
          <img
            src="/logo.svg"
            alt="Logo of Lenny TESTU--CHARPENTIER"
            class="w-48 h-48 mb-8 dark:border dark:border-[--color-primary] dark:bg-[--color-primary] dark:rounded-full"
          />
          <h1 class="text-3xl font-bold mb-4">Currently under maintenance</h1>
          <p class="text-lg text-center max-w-md text-[--color-text-muted]">
            The site is currently under maintenance to get a fresh look. Thank
            you for your patience.
          </p>
        </div>
      </main>
      <footer class="absolute bottom-4 text-[--color-title-muted] w-full">
        <div
          class="max-w-3xl w-full mx-auto px-6 flex flex-col-reverse sm:flex-row justify-center sm:justify-between items-center gap-4 sm:gap-0"
        >
          <p class="text-sm">&copy; 2026 Lenny TESTU--CHARPENTIER</p>
          <div class="flex flex-row items-center gap-1">
            <a
              href="https://github.com/lenny7o"
              target="_blank"
              rel="noopener noreferrer"
              class="p-2"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="h-5 w-5"
              >
                <path
                  d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"
                ></path>
              </svg>
            </a>
            <a
              href="https://www.linkedin.com/in/lenny-tc/"
              target="_blank"
              rel="noopener noreferrer"
              class="p-2"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="h-5 w-5"
              >
                <path
                  d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"
                ></path>
                <rect x="2" y="9" width="4" height="12"></rect>
                <circle cx="4" cy="4" r="2"></circle>
              </svg>
            </a>
            <a href="mailto:lennytc@outlook.com" class="p-2">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="h-5 w-5"
              >
                <path
                  d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                ></path>
                <polyline points="22,6 12,13 2,6"></polyline>
              </svg>
            </a>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
